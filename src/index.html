<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>IPAS AI 中級 — 互動學習遊戲</title>
<!-- 遊戲化 CDN(使用者已解禁) -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
  :root {
    --bg: #0f172a; --bg-2: #1e293b; --bg-3: #334155;
    --fg: #e2e8f0; --fg-dim: #94a3b8; --fg-mute: #64748b;
    --primary: #38bdf8; --primary-fg: #0c4a6e;
    --success: #4ade80; --danger: #f87171; --warn: #facc15;
    --border: #334155; --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --radius: 12px; --radius-sm: 6px;
  }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f8fafc; --bg-2: #ffffff; --bg-3: #e2e8f0;
      --fg: #0f172a; --fg-dim: #475569; --fg-mute: #94a3b8;
      --primary: #0284c7; --primary-fg: #f0f9ff; --border: #cbd5e1;
      --shadow: 0 4px 20px rgba(0,0,0,0.08); }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: 'Noto Sans TC', 'Noto Sans CJK TC', system-ui, -apple-system, sans-serif;
    background: var(--bg); color: var(--fg); line-height: 1.6; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; display: flex; flex-direction: column; }
  button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  a { color: var(--primary); text-decoration: none; }

  header { background: var(--bg-2); border-bottom: 1px solid var(--border);
    padding: 12px 16px; position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .countdown { font-weight: 700; font-size: 1.1rem; color: var(--warn); }
  .countdown.urgent { color: var(--danger); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .header-stats { display: flex; gap: 12px; font-size: 0.875rem; color: var(--fg-dim); flex-wrap: wrap; }
  .badge { background: var(--bg-3); padding: 2px 8px; border-radius: var(--radius-sm); font-size: 0.8rem; }

  main { flex: 1; padding: 20px 16px; max-width: 1200px; margin: 0 auto; width: 100%; }

  .view { display: none; animation: fadeIn 0.3s; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* 首頁 */
  h1 { font-size: 1.5rem; margin-bottom: 16px; }
  h2 { font-size: 1.25rem; margin: 16px 0 8px; }
  h3 { font-size: 1.1rem; margin: 12px 0 6px; }

  .card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
  .card h2 { color: var(--primary); margin-top: 0; }

  .modes-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; }
  .mode-card { background: var(--bg-2); border: 2px solid var(--border); border-radius: var(--radius);
    padding: 16px; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
  .mode-card:hover { border-color: var(--primary); transform: translateY(-2px); }
  .mode-card .mode-num { font-size: 0.75rem; color: var(--fg-mute); font-weight: 700; }
  .mode-card .mode-title { font-size: 1.1rem; font-weight: 700; margin: 4px 0; }
  .mode-card .mode-desc { font-size: 0.875rem; color: var(--fg-dim); }
  .mode-card .mode-stats { margin-top: 8px; font-size: 0.75rem; color: var(--fg-mute); }

  .progress-bar { height: 8px; background: var(--bg-3); border-radius: var(--radius-sm); overflow: hidden; margin: 8px 0; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success));
    transition: width 0.5s; }

  /* Play view */
  .question-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 24px; margin-bottom: 16px; }
  .question-meta { display: flex; gap: 8px; font-size: 0.75rem; color: var(--fg-mute); margin-bottom: 12px; flex-wrap: wrap; }
  .question-stem { font-size: 1.1rem; line-height: 1.8; margin-bottom: 16px; }
  .question-code { background: #0a0e1a; color: #cdd6f4; padding: 12px; border-radius: var(--radius-sm);
    font-family: 'Cascadia Code', 'JetBrains Mono', Consolas, monospace; font-size: 0.875rem;
    overflow-x: auto; margin: 12px 0; white-space: pre; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-btn { padding: 12px 16px; background: var(--bg-3); border: 2px solid var(--border);
    border-radius: var(--radius-sm); text-align: left; transition: all 0.2s; font-size: 0.95rem; }
  .option-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--bg-2); }
  .option-btn .option-key { font-weight: 700; color: var(--primary); margin-right: 8px; }
  .option-btn:disabled { cursor: not-allowed; }
  .option-btn.correct { border-color: var(--success); background: rgba(74,222,128,0.1); }
  .option-btn.wrong { border-color: var(--danger); background: rgba(248,113,113,0.1); }

  /* Explanation */
  .explanation { margin-top: 16px; padding: 16px; background: var(--bg-3);
    border-left: 4px solid var(--primary); border-radius: var(--radius-sm); animation: fadeIn 0.4s; }
  .explanation h3 { color: var(--primary); margin-top: 0; }
  .explanation .verdict { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; }
  .explanation .verdict.correct { color: var(--success); }
  .explanation .verdict.wrong { color: var(--danger); }
  .explanation .hook { background: var(--bg-2); padding: 8px 12px; border-radius: var(--radius-sm);
    margin: 8px 0; border-left: 3px solid var(--warn); font-style: italic; }
  .explanation .miscon { font-size: 0.875rem; color: var(--fg-dim); margin-top: 8px; }
  .explanation .miscon strong { color: var(--warn); }

  /* 動作按鈕 */
  .actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  .btn { padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 600; transition: all 0.2s;
    border: 2px solid transparent; }
  .btn-primary { background: var(--primary); color: var(--primary-fg); }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-ghost { border-color: var(--border); color: var(--fg-dim); background: transparent; }
  .btn-ghost:hover { border-color: var(--primary); color: var(--fg); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-warn { background: var(--warn); color: #0c0c0c; }

  /* Stats / weak points */
  .weak-list { display: flex; flex-direction: column; gap: 8px; }
  .weak-item { display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px; background: var(--bg-3); border-radius: var(--radius-sm); }
  .weak-item .weak-score { font-weight: 700; }
  .weak-item .weak-score.low { color: var(--danger); }
  .weak-item .weak-score.mid { color: var(--warn); }
  .weak-item .weak-score.high { color: var(--success); }

  /* Bottom nav for mobile */
  nav.bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg-2); border-top: 1px solid var(--border); padding: 8px;
    justify-content: space-around; z-index: 100; }
  nav.bottom-nav button { padding: 8px 12px; font-size: 0.75rem; color: var(--fg-dim); flex: 1; }
  nav.bottom-nav button.active { color: var(--primary); }

  /* 響應式 */
  @media (max-width: 600px) {
    main { padding: 12px; padding-bottom: 80px; }
    .modes-grid { grid-template-columns: 1fr; }
    .question-stem { font-size: 1rem; }
    nav.bottom-nav { display: flex; }
    .header-stats { display: none; }
    .header-stats.expanded { display: flex; }
  }

  /* 配對戰專屬(案 4) */
  .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .pair-card { background: var(--bg-2); border: 2px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; cursor: pointer; transition: all 0.2s; min-height: 60px;
    display: flex; align-items: center; justify-content: center; text-align: center; }
  .pair-card:hover { border-color: var(--primary); }
  .pair-card.selected { border-color: var(--warn); background: rgba(250,204,21,0.1); }
  .pair-card.matched { border-color: var(--success); background: rgba(74,222,128,0.15); cursor: default; }
  .pair-card.mismatched { border-color: var(--danger); animation: shake 0.4s; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }

  /* RPG 對話框(案 1) */
  .rpg-scene { background: linear-gradient(135deg, #1e3a5f, #2d4a7a); border-radius: var(--radius);
    padding: 24px; margin-bottom: 16px; min-height: 200px; position: relative; overflow: hidden; }
  .rpg-character { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 16px; }
  .rpg-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg-3);
    display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .rpg-dialogue { flex: 1; background: rgba(255,255,255,0.1); border-radius: var(--radius-sm); padding: 12px; }
  .rpg-industry-tag { background: var(--primary); color: var(--primary-fg); padding: 2px 8px;
    border-radius: var(--radius-sm); font-size: 0.75rem; font-weight: 700; }

  /* Pipeline 拼圖(案 3 簡化版:點擊排序) */
  .pipeline-list { display: flex; flex-direction: column; gap: 6px; margin: 12px 0; }
  .pipeline-step { background: var(--bg-3); padding: 10px 14px; border-radius: var(--radius-sm);
    border: 2px solid transparent; cursor: pointer; transition: all 0.2s; user-select: none; }
  .pipeline-step.selected { border-color: var(--primary); background: var(--bg-2); }
  .pipeline-step.placed { border-color: var(--success); background: rgba(74,222,128,0.1); }
  .pipeline-step .step-order { display: inline-block; width: 24px; height: 24px; line-height: 24px;
    text-align: center; background: var(--primary); color: var(--primary-fg); border-radius: 50%;
    font-weight: 700; margin-right: 8px; font-size: 0.875rem; }

  /* Hunter mode boss(案 5) */
  .boss-bar { background: linear-gradient(90deg, var(--danger), #ff8c42); padding: 12px;
    border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 0 20px rgba(248,113,113,0.4); }
  .boss-bar .boss-name { font-weight: 800; font-size: 1.2rem; color: white; }
  .boss-hp { background: rgba(0,0,0,0.3); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 6px; }
  .boss-hp-fill { background: var(--danger); height: 100%; transition: width 0.4s; }

  /* 程式碼判讀(案 2) */
  .code-question { background: #0a0e1a; color: #cdd6f4; padding: 16px; border-radius: var(--radius);
    font-family: monospace; line-height: 1.7; overflow-x: auto; }
  .code-question .keyword { color: #cba6f7; }
  .code-question .string { color: #a6e3a1; }
  .code-question .number { color: #fab387; }
  .code-question .comment { color: #6c7086; font-style: italic; }

  /* Toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--bg-3); padding: 12px 20px; border-radius: var(--radius); box-shadow: var(--shadow);
    z-index: 200; animation: fadeIn 0.3s; max-width: 90%; }

  .loading { text-align: center; padding: 40px; color: var(--fg-dim); }
  .empty { text-align: center; padding: 40px; color: var(--fg-mute); }

  /* === 遊戲化通用樣式(Phase C)=== */
  .battle-arena { background: linear-gradient(135deg, #1e1b4b, #4c1d95, #831843);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px; position: relative; overflow: hidden;
    box-shadow: 0 0 40px rgba(168,85,247,0.3); }
  .battle-arena::before { content: ''; position: absolute; inset: 0; background:
    radial-gradient(ellipse at top, rgba(255,255,255,0.1), transparent 70%);
    pointer-events: none; }
  .player-bar, .enemy-bar { display: flex; gap: 12px; align-items: center; padding: 8px;
    background: rgba(0,0,0,0.4); border-radius: var(--radius-sm); margin-bottom: 8px; position: relative; z-index: 1; }
  .avatar { width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg,#1e293b,#475569);
    display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(56,189,248,0.4); }
  .avatar.boss { background: linear-gradient(135deg, #7f1d1d, #991b1b); box-shadow: 0 0 20px rgba(239,68,68,0.4); }
  .avatar.taking-damage { animation: shake 0.4s; }
  .avatar.attacking { animation: attack 0.5s; }
  @keyframes attack { 0%,100% { transform: translateX(0); } 50% { transform: translateX(20px) scale(1.1); } }
  .bar-info { flex: 1; }
  .bar-name { font-weight: 700; font-size: 0.95rem; }
  .bar-name .level { background: var(--primary); color: var(--primary-fg); padding: 1px 6px;
    border-radius: 4px; font-size: 0.75rem; margin-right: 6px; }
  .hp-track { height: 14px; background: rgba(0,0,0,0.5); border-radius: 7px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1); }
  .hp-fill { height: 100%; background: linear-gradient(90deg, #4ade80, #22c55e); transition: width 0.6s cubic-bezier(.4,0,.2,1); }
  .hp-fill.low { background: linear-gradient(90deg, #facc15, #f59e0b); }
  .hp-fill.critical { background: linear-gradient(90deg, #ef4444, #b91c1c); animation: pulseHP 1s infinite; }
  @keyframes pulseHP { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
  .hp-text { font-size: 0.8rem; color: var(--fg-dim); margin-top: 2px; }

  /* 傷害數字飛出 */
  .damage-num { position: absolute; font-size: 2rem; font-weight: 900; pointer-events: none;
    text-shadow: 0 0 12px currentColor; z-index: 100; }
  .damage-num.player { color: #fbbf24; }
  .damage-num.enemy { color: #f87171; }
  .damage-num.crit { font-size: 3rem; color: #fb923c; }

  /* Combo 連擊 */
  .combo-display { position: fixed; top: 80px; right: 16px; padding: 8px 16px;
    background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: var(--radius);
    font-weight: 800; color: white; box-shadow: 0 0 20px rgba(251,146,60,0.6);
    z-index: 200; opacity: 0; pointer-events: none; }
  .combo-display.show { opacity: 1; }
  .combo-display .combo-num { font-size: 1.5rem; }

  /* 對話框 */
  .dialogue-box { background: rgba(15,23,42,0.85); border: 2px solid rgba(56,189,248,0.4);
    border-radius: var(--radius); padding: 16px; margin: 12px 0; backdrop-filter: blur(8px);
    position: relative; }
  .dialogue-box::before { content: ''; position: absolute; left: 24px; top: -10px;
    width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
    border-bottom: 10px solid rgba(56,189,248,0.4); }
  .dialogue-name { color: var(--primary); font-weight: 700; margin-bottom: 6px; font-size: 0.95rem; }
  .dialogue-text { line-height: 1.7; }

  /* 視覺資料表格(VGG16 等) */
  .data-table { width: 100%; border-collapse: collapse; margin: 12px 0;
    background: var(--bg-3); border-radius: var(--radius-sm); overflow: hidden;
    font-family: monospace; font-size: 0.8rem; }
  .data-table th { background: var(--bg-2); padding: 8px; text-align: left;
    border-bottom: 2px solid var(--primary); color: var(--primary); position: sticky; top: 0; }
  .data-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .data-table tr:hover { background: rgba(56,189,248,0.05); }
  .data-table .highlight { color: var(--warn); font-weight: 700; }

  /* 程式碼語法高亮 */
  .code-syntax { background: #0a0e1a; color: #cdd6f4; padding: 16px; border-radius: var(--radius-sm);
    font-family: 'Cascadia Code', 'JetBrains Mono', Consolas, monospace; font-size: 0.85rem;
    overflow-x: auto; line-height: 1.6; border-left: 4px solid var(--primary); }
  .code-syntax .kw { color: #cba6f7; font-weight: 600; } /* keyword */
  .code-syntax .str { color: #a6e3a1; } /* string */
  .code-syntax .num { color: #fab387; } /* number */
  .code-syntax .com { color: #6c7086; font-style: italic; } /* comment */
  .code-syntax .fn { color: #89b4fa; } /* function */
  .code-syntax .ty { color: #f9e2af; } /* type */

  /* 技能 / 等級 */
  .skill-tray { display: flex; gap: 8px; padding: 8px; background: var(--bg-2);
    border-radius: var(--radius-sm); margin-bottom: 12px; flex-wrap: wrap; }
  .skill-btn { padding: 8px 12px; background: var(--bg-3); border: 2px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s; font-size: 0.875rem; }
  .skill-btn:hover:not(:disabled) { border-color: var(--warn); transform: translateY(-2px); }
  .skill-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .skill-cost { color: var(--warn); font-size: 0.75rem; }

  /* 升級 + 過場 */
  .level-up { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex;
    align-items: center; justify-content: center; z-index: 9999; backdrop-filter: blur(4px); }
  .level-up-card { background: linear-gradient(135deg, #fbbf24, #f59e0b);
    color: #422006; padding: 32px; border-radius: var(--radius); text-align: center;
    box-shadow: 0 0 80px rgba(251,191,36,0.6); transform: scale(0); }
  .level-up-card h1 { font-size: 2rem; margin-bottom: 8px; }

  /* 入場動畫 */
  @keyframes slideInBattle { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
  .battle-arena { animation: slideInBattle 0.5s; }

  /* 視覺資料區塊 */
  .visual-data { margin: 12px 0; }
  .visual-data-title { font-size: 0.85rem; color: var(--fg-dim); margin-bottom: 6px; }

  /* 答對 / 答錯 全螢幕閃光 */
  .flash-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 5000;
    opacity: 0; transition: opacity 0.3s; }
  .flash-overlay.correct { background: radial-gradient(ellipse at center, rgba(74,222,128,0.4), transparent 70%); }
  .flash-overlay.wrong { background: radial-gradient(ellipse at center, rgba(248,113,113,0.4), transparent 70%); }
  .flash-overlay.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="countdown" id="countdown">D-?</div>
    <div class="header-stats" id="header-stats">
      <span class="badge">已熟練 <span id="stat-mastered">0</span> / <span id="stat-total">87</span></span>
      <span class="badge">錯題 <span id="stat-wrong">0</span></span>
      <span class="badge">場次 <span id="stat-sessions">0</span></span>
    </div>
    <button class="btn btn-ghost" onclick="goHome()" style="margin-left:auto">🏠 首頁</button>
  </div>
</header>

<main>
  <!-- 首頁 -->
  <section id="view-home" class="view active">
    <div class="card">
      <h1>📘 IPAS AI 中級 — 衝刺練習場</h1>
      <p style="color:var(--fg-dim)">考試日:2026-05-23 · 鐵律驅動的個人化學習</p>
      <div class="progress-bar"><div class="progress-fill" id="overall-progress" style="width:0%"></div></div>
    </div>

    <div class="card">
      <h2>🎮 選擇模式</h2>
      <div class="modes-grid">
        <button class="mode-card" onclick="enterMode(4)">
          <div class="mode-num">案 4</div>
          <div class="mode-title">⚡ 易混淆配對戰</div>
          <div class="mode-desc">14 組高頻易混淆對,快速記憶 + 配對挑戰</div>
          <div class="mode-stats">入門 · 速戰</div>
        </button>
        <button class="mode-card" onclick="enterMode(2)">
          <div class="mode-num">案 2</div>
          <div class="mode-title">💻 程式判讀道場</div>
          <div class="mode-desc">numpy / sklearn / PyTorch 程式碼題</div>
          <div class="mode-stats">中級 · VGG16 連戰</div>
        </button>
        <button class="mode-card" onclick="enterMode(5)">
          <div class="mode-num">案 5</div>
          <div class="mode-title">🎯 弱點獵人</div>
          <div class="mode-desc">系統追蹤熟練度,自動針對弱點下鑽</div>
          <div class="mode-stats">自適應 · Boss 戰</div>
        </button>
        <button class="mode-card" onclick="enterMode(1)">
          <div class="mode-num">案 1</div>
          <div class="mode-title">🏢 AI 顧問實驗室</div>
          <div class="mode-desc">12 產業情境決策,扮演企業 AI 顧問</div>
          <div class="mode-stats">情境 · 產業任務</div>
        </button>
        <button class="mode-card" onclick="enterMode(3)">
          <div class="mode-num">案 3</div>
          <div class="mode-title">🧩 Pipeline 拼圖工坊</div>
          <div class="mode-desc">ML 流程排序與步驟判斷</div>
          <div class="mode-stats">進階 · 流程</div>
        </button>

<div id="toast-container"></div>

<script>
/*=== 鐵律 #1+#2 核心引擎 ===*/

// === Storage 包裝 ===
const Storage = {
  K_PROGRESS: 'ipas_progress_v1',
  K_MASTERY: 'ipas_mastery_v1',
  K_WRONGBOOK: 'ipas_wrongbook_v1',
  K_SETTINGS: 'ipas_settings_v1',
  K_SESSION: 'ipas_session_state_v1',
  get(k, d) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch { return d; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.warn('storage full:', e); } },
  del(k) { localStorage.removeItem(k); }
};

// === Random / Seed ===
const RNG = {
  seed: Date.now(),
  set(s) { this.seed = s; },
  // mulberry32
  next() { let t = this.seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296; },
  pick(arr) { return arr[Math.floor(this.next() * arr.length)]; },
  shuffle(arr) { const a = [...arr]; for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(this.next() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; },
  pickN(arr, n) { return this.shuffle(arr).slice(0, n); }
};

// === Variation:鐵律 #2 變數池替換 ===
function applyVariables(stem, variables) {
  if (!variables) return stem;
  let result = stem;
  for (const [key, pool] of Object.entries(variables)) {
    if (Array.isArray(pool)) {
      const pick = RNG.pick(pool);
      result = result.replaceAll(`{${key}}`, pick);
    }
  }
  return result;
}

// === 計算題 case 隨機(鐵律 #2)===
function pickCase(question) {
  if (question.format !== 'calculation' || !question.stem_variables) return null;
  const cases = Object.entries(question.stem_variables).filter(([k]) => k.startsWith('case_'));
  if (cases.length === 0) return null;
  return RNG.pick(cases)[1];
}

// === 渲染題目(鐵律 #2 應用變數池 + 選項洗牌)===
function renderQuestion(q) {
  const rendered = JSON.parse(JSON.stringify(q));
  // 計算題 case
  const c = pickCase(rendered);
  if (c) {
    for (const [k, v] of Object.entries(c)) {
      rendered.stem = rendered.stem.replaceAll(`{${k}}`, v);
      rendered.explanation.correct = rendered.explanation.correct.replaceAll(`{${k}}`, v);
      if (k === 'answer') {
        rendered.options = rendered.options.map(o => ({...o, is_correct: o.text === v}));
      }
    }
  }
  // 變數池
  rendered.stem = applyVariables(rendered.stem, rendered.stem_variables);
  // 洗牌選項
  if (rendered.shuffle_options !== false) {
    rendered.options = RNG.shuffle(rendered.options);
  }
  // 加 key A/B/C/D
  rendered.options = rendered.options.map((o, i) => ({...o, key: String.fromCharCode(65+i)}));
  return rendered;
}

// === 進度 / 倒數 ===
const Progress = {
  EXAM_DATE: new Date('2026-05-23T00:00:00+08:00'),
  init() {
    const p = Storage.get(Storage.K_PROGRESS, null);
    if (!p) Storage.set(Storage.K_PROGRESS, { started: Date.now(), sessions: 0, totalAnswered: 0, totalCorrect: 0 });
  },
  daysLeft() { return Math.max(0, Math.ceil((this.EXAM_DATE - Date.now()) / 86400000)); },
  addSession() { const p = Storage.get(Storage.K_PROGRESS, {sessions:0}); p.sessions++; Storage.set(Storage.K_PROGRESS, p); },
  addAnswer(correct) {
    const p = Storage.get(Storage.K_PROGRESS, {totalAnswered:0,totalCorrect:0});
    p.totalAnswered = (p.totalAnswered||0) + 1;
    if (correct) p.totalCorrect = (p.totalCorrect||0) + 1;
    Storage.set(Storage.K_PROGRESS, p);
  }
};

// === Mastery 熟練度 ===
const Mastery = {
  load() { return Storage.get(Storage.K_MASTERY, {}); },
  save(m) { Storage.set(Storage.K_MASTERY, m); },
  get(nodeId) { return this.load()[nodeId] || { score: 0, attempts: 0, correct: 0, streak: 0 }; },
  update(nodeId, isCorrect) {
    const m = this.load();
    const node = m[nodeId] || { score: 0, attempts: 0, correct: 0, streak: 0 };
    node.attempts++;
    if (isCorrect) {
      node.correct++; node.streak++;
      node.score = Math.min(100, node.score + 10 + Math.min(15, node.streak * 2));
    } else {
      node.streak = 0;
      node.score = Math.max(0, node.score - 5);
    }
    node.lastSeen = Date.now();
    m[nodeId] = node; this.save(m);
    return node;
  },
  drillBonus(nodeId) { const m = this.load(); if (!m[nodeId]) m[nodeId] = {score:0,attempts:0,correct:0,streak:0};
    m[nodeId].score = Math.min(100, m[nodeId].score + 20); this.save(m); },
  getWeakest(nodeIds, n = 5) {
    const m = this.load();
    return nodeIds
      .map(id => ({ id, score: (m[id] && m[id].attempts > 0) ? m[id].score : 50 }))
      .sort((a,b) => a.score - b.score).slice(0, n);
  },
  countMastered() { const m = this.load(); return Object.values(m).filter(n => n.score >= 90).length; }
};

// === Wrongbook 錯題本 ===
const Wrongbook = {
  load() { return Storage.get(Storage.K_WRONGBOOK, []); },
  save(w) { Storage.set(Storage.K_WRONGBOOK, w); },
  add(qid, nodeId, userChoice, correctChoice) {
    const w = this.load();
    const existing = w.find(x => x.qid === qid);
    if (existing) {
      existing.wrongCount = (existing.wrongCount||1) + 1;
      existing.lastWrong = Date.now();
    } else {
      w.push({ qid, nodeId, userChoice, correctChoice, wrongCount: 1, addedAt: Date.now(), lastWrong: Date.now(), mastered: false, drillCount: 0 });
    }
    this.save(w);
  },
  markMastered(qid) {
    const w = this.load();
    const x = w.find(e => e.qid === qid);
    if (x) { x.mastered = true; this.save(w); }
  },
  count() { return this.load().filter(x => !x.mastered).length; }
};

// === Question Bank Loader(高品質原創題庫,鐵律 #3 全合規)===
let QUESTIONS = [];
async function loadQuestions() {
  const files = [
    'questions.json',                  // 50 baseline
    'questions-pa-code.json',          // 12 程式判讀(刪 3 後)
    'questions-pb-visual.json',        // 10 表格判讀
    'questions-pc-modes.json',         // 15 matching/sequence/calc
    'questions-pd-scenario.json',      // 15 情境決策
    'questions-pe-advanced-s1.json',   // 5 進階 NLP/CV/GenAI(刪 7 後)
    'questions-pf-advanced-s3.json',   // 6 進階 ML(刪 6 後)
    'questions-pg-eval.json',          // 9 進階評估(刪 4 後)
    'questions-ph-mlops.json',         // 6 進階 MLOps(刪 7 後)
    'questions-batch-n1-nlp.json',     // 25 NLP 新批
    'questions-batch-n2-cv.json',      // 25 CV 新批
    'questions-batch-n3-genai.json',   // 25 GenAI+多模態 新批
    'questions-batch-n4-planning.json',// 25 AI 規劃 新批
    'questions-batch-n5-deploy.json',  // 25 部署 新批
    'questions-batch-n6-ml-core.json', // 22 ML 基礎 新批
    'questions-batch-n7-dl.json',      // 25 DL+數據準備 新批
    'questions-batch-n8-eval-gov.json' // 25 評估治理 新批
  ];
  try {
    const results = await Promise.all(
      files.map(f => fetch(f).then(r => r.ok ? r.json() : { questions: [] })
                              .catch(() => ({ questions: [] })))
    );
    QUESTIONS = results.flatMap(r => r.questions || []);
    window.QUESTIONS = QUESTIONS; // sync to window for dynamically-loaded mode scripts (mode3/mode4 read window.QUESTIONS)
    document.getElementById('stat-total').textContent = QUESTIONS.length;
    console.log(`已載入 ${QUESTIONS.length} 題,來自 ${files.length} 個題庫檔`);
    return QUESTIONS;
  } catch (e) {
    showToast('題庫載入失敗,請以 http server 啟動本檔案'); throw e;
  }
}

// === Variation 鐵律 #1 嚴格結構化下鑽(寧少勿濫,保緊扣性)===
function generateVariation(originalQ, count = 3) {
  const candidates = QUESTIONS.filter(q => q.id !== originalQ.id); // 排除原題
  const sameNode = candidates.filter(q => q.node_id === originalQ.node_id);
  const relatedIds = originalQ.related_node_ids || [];
  const relatedNode = candidates.filter(q => relatedIds.includes(q.node_id) && q.node_id !== originalQ.node_id);

  // 上層題的關鍵詞(從 hook + tags + misconceptions 提取),用來篩選同主題下「真有關聯」的題
  const upperKeywords = new Set();
  const addKw = (s) => { if (!s) return; (s + '').split(/[\s,、。()()「」/]/).forEach(w => { if (w.length >= 2) upperKeywords.add(w); }); };
  addKw(originalQ.explanation?.hook);
  (originalQ.tags || []).forEach(addKw);
  (originalQ.misconceptions || []).forEach(addKw);

  // sameCode 僅取「關鍵詞至少 2 個重疊」的題目(避免跨度過大)
  const sameCodeFiltered = candidates.filter(q => {
    if (q.knowledge_code !== originalQ.knowledge_code) return false;
    if (sameNode.includes(q) || relatedNode.includes(q)) return false;
    let hits = 0;
    const text = ((q.explanation?.hook || '') + ' ' + (q.tags || []).join(' ') + ' ' + (q.misconceptions || []).join(' '));
    upperKeywords.forEach(kw => { if (text.includes(kw)) hits++; });
    return hits >= 2;
  });

  const diffOrder = { easy: 0, medium: 1, hard: 2 };
  const harderThan = (level) => (q) => (diffOrder[q.difficulty] ?? 1) > (diffOrder[level] ?? 1);

  const result = [];
  const used = new Set();
  const addPick = (q, strategy) => {
    if (!q || used.has(q.id)) return false;
    used.add(q.id);
    q._drillStrategy = strategy;
    result.push(q);
    return true;
  };

  // 變化 1:換角度(嚴格同 node_id,優先換 format)
  const diffFormat = sameNode.filter(q => q.format !== originalQ.format);
  if (!addPick(RNG.pick(diffFormat), '換角度')) addPick(RNG.pick(sameNode), '同知識點');

  // 變化 2:易混淆(嚴格 related_node_ids)
  if (!addPick(RNG.pick(relatedNode.filter(q => !used.has(q.id))), '易混淆對手')) {
    // 退而求次:同 node_id 還有題就再選
    const moreSame = sameNode.filter(q => !used.has(q.id));
    addPick(RNG.pick(moreSame), '同知識點再深入');
  }

  // 變化 3:加深難度(同 node_id 或 related 的 hard)
  const harder = [...sameNode, ...relatedNode].filter(q => !used.has(q.id) && harderThan(originalQ.difficulty || 'medium')(q));
  if (!addPick(RNG.pick(harder), '加深難度')) {
    // 退而求次:sameCodeFiltered(必須關鍵詞重疊 ≥ 2)
    addPick(RNG.pick(sameCodeFiltered.filter(q => !used.has(q.id))), '同主題延伸');
  }

  // 最終保險:若三策略全失敗 → 用同 knowledge_code 任意題(誠實標註寬鬆 fallback)
  if (result.length === 0) {
    const anyInCode = candidates.filter(q => q.knowledge_code === originalQ.knowledge_code);
    if (anyInCode.length > 0) {
      const q = RNG.pick(anyInCode);
      q._drillStrategy = '寬鬆延伸';
      result.push(q);
    }
    // 若同 code 也沒題,使用同 subject 任意題
    if (result.length === 0) {
      const anyInSubject = candidates.filter(q => q.subject === originalQ.subject);
      if (anyInSubject.length > 0) {
        const q = RNG.pick(anyInSubject);
        q._drillStrategy = '寬鬆延伸';
        result.push(q);
      }
    }
  }

  return result.map(q => {
    const rendered = renderQuestion(q);
    rendered._drillStrategy = q._drillStrategy;
    return rendered;
  });
}

// === Toast ===
function showToast(msg, ms = 2000) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), ms);
}

// === Router ===
function show(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function goHome() { refreshHome(); show('view-home'); }
function goStats() { renderStats(); show('view-stats'); }

function refreshHome() {
  // 倒數
  const d = Progress.daysLeft();
  const cd = document.getElementById('countdown');
  cd.textContent = `D-${d}`;
  if (d <= 7) cd.classList.add('urgent');
  // 統計
  document.getElementById('stat-mastered').textContent = Mastery.countMastered();
  document.getElementById('stat-wrong').textContent = Wrongbook.count();
  const sess = Storage.get(Storage.K_PROGRESS, {sessions:0}).sessions;
  document.getElementById('stat-sessions').textContent = sess;
  // 進度條
  const total = QUESTIONS.length;
  const masterCount = Mastery.countMastered();
  const pct = total > 0 ? Math.round(masterCount / total * 100) : 0;
  document.getElementById('overall-progress').style.width = pct + '%';
  // 弱點
  renderWeakList();
}

function renderWeakList() {
  const allNodes = [...new Set(QUESTIONS.map(q => q.node_id).filter(Boolean))];
  const m = Mastery.load();
  const attempted = Object.keys(m);
  if (attempted.length === 0) {
    document.getElementById('weak-list').innerHTML = '<div class="empty">尚無資料,先做題再回來看</div>';
    return;
  }
  const weak = Mastery.getWeakest(attempted, 5);
  document.getElementById('weak-list').innerHTML = weak.map(w => {
    const cls = w.score < 40 ? 'low' : w.score < 70 ? 'mid' : 'high';
    return `<div class="weak-item">
      <span>${w.id}</span>
      <span class="weak-score ${cls}">熟練度 ${w.score}%</span>
    </div>`;
  }).join('');
}

// === 模式進入(動態查找,解決時序問題)===
function enterMode(mode) {
  Progress.addSession();
  if (mode === 4) return Mode4.start();
  if (mode === 'review') return Review.start();
  // 案 1/2/3/5 從 window 動態取
  const M = window['Mode' + mode];
  if (M && typeof M.start === 'function') {
    M.start();
  } else {
    showToast('案 ' + mode + ' 模組尚未載入,請稍候 1 秒再試或重新整理');
  }
}

// === 共用 Play 引擎(各 mode 可呼叫)===
const PlayEngine = {
  current: null,
  history: [],

  show(question, opts = {}) {
    this.current = renderQuestion(question);
    const view = document.getElementById('view-play');
    const ctx = opts.contextHTML || '';
    const code = this.current.code_block ? `<pre class="code-syntax">${highlightCodeSimple(this.current.code_block)}</pre>` : '';
    const visualData = renderVisualData(this.current); // ← 修復:渲染 table_data / chart_data
    view.innerHTML = `
      ${ctx}
      <div class="question-card">
        <div class="question-meta">
          <span class="badge">編碼 ${this.current.knowledge_code}</span>
          <span class="badge">${this.current.difficulty}</span>
          <span class="badge">${this.current.format}</span>
          ${this.current.errata_critical ? '<span class="badge" style="background:var(--danger);color:white">⚠️ 勘誤必出</span>' : ''}
        </div>
        <div class="question-stem">${this.current.stem}</div>
        ${code}
        ${visualData}
        <div class="options" id="play-options">
          ${this.current.options.map(o => `
            <button class="option-btn" data-key="${o.key}" onclick="PlayEngine.answer('${o.key}')">
              <span class="option-key">${o.key}.</span>${o.text}
            </button>
          `).join('')}
        </div>
        <div id="play-explanation"></div>
      </div>
    `;
    show('view-play');
  },

  answer(key) {
    const opt = this.current.options.find(o => o.key === key);
    const isCorrect = opt.is_correct;
    // 鎖定按鈕
    document.querySelectorAll('#play-options .option-btn').forEach(b => {
      b.disabled = true;
      const k = b.dataset.key;
      const optionData = this.current.options.find(o => o.key === k);
      if (optionData.is_correct) b.classList.add('correct');
      else if (k === key && !isCorrect) b.classList.add('wrong');
    });
    // 更新熟練度 + 錯題本
    if (this.current.node_id) Mastery.update(this.current.node_id, isCorrect);
    Progress.addAnswer(isCorrect);
    if (!isCorrect) {
      const correctOpt = this.current.options.find(o => o.is_correct);
      Wrongbook.add(this.current.id, this.current.node_id, key, correctOpt.key);
    }
    // 顯示解釋
    this.showExplanation(opt, isCorrect);
  },

  showExplanation(opt, isCorrect) {
    const q = this.current;
    const e = q.explanation || {};
    const correctOpt = q.options.find(o => o.is_correct);

    // 為任意選項查找 wrong 解釋(寬容匹配)
    const findWrongExp = (option) => {
      let exp = '';
      if (e.wrong && typeof e.wrong === 'object') {
        exp = e.wrong[option.text];
        if (!exp) {
          for (const k of Object.keys(e.wrong)) {
            if (k && (k.includes(option.text.substring(0, 8)) || option.text.includes(k.substring(0, 8)))) {
              exp = e.wrong[k]; break;
            }
          }
        }
      }
      if (!exp) exp = option.trap_type ? `陷阱類型:${option.trap_type}` : '此選項不正確';
      return exp;
    };

    // 其他選項解析(所有 is_correct=false 的選項)
    const otherWrongOptions = q.options.filter(o => !o.is_correct && (!opt || o.key !== opt.key));
    const otherAnalysis = otherWrongOptions.map(o => `
      <div style="padding:8px 10px;margin:6px 0;background:rgba(255,255,255,0.04);border-radius:4px;border-left:3px solid #94a3b8">
        <div style="color:#cbd5e1;font-weight:600;margin-bottom:2px">${o.key}. ${o.text}</div>
        <div style="color:var(--fg-dim);font-size:0.875rem;line-height:1.6">└ ${findWrongExp(o)}</div>
      </div>
    `).join('');

    const userWrongExp = !isCorrect && opt ? findWrongExp(opt) : '';

    const html = `
      <div class="explanation">
        <div class="verdict ${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✅ 答對!' : '❌ 答錯了'}</div>

        <div style="background:rgba(74,222,128,0.12);border-left:4px solid #4ade80;padding:12px;border-radius:6px;margin:10px 0">
          <div style="color:#4ade80;font-weight:700;font-size:0.95rem;margin-bottom:4px">📚 正確答案</div>
          <div style="font-size:1rem;margin-bottom:6px"><strong>${correctOpt ? correctOpt.key + '. ' + correctOpt.text : '(無)'}</strong></div>
          <div style="color:var(--fg);line-height:1.7">${e.correct || '(此題未提供詳細解釋,請參考正確選項文字)'}</div>
        </div>

        ${!isCorrect ? `<div style="background:rgba(248,113,113,0.12);border-left:4px solid #f87171;padding:12px;border-radius:6px;margin:10px 0">
          <div style="color:#f87171;font-weight:700;font-size:0.95rem;margin-bottom:4px">❌ 你選了 ${opt.key}. ${opt.text}</div>
          <div style="color:var(--fg);line-height:1.7">${userWrongExp}</div>
        </div>` : ''}

        ${otherAnalysis ? `<div style="background:rgba(148,163,184,0.08);border-left:4px solid #94a3b8;padding:12px;border-radius:6px;margin:10px 0">
          <div style="color:#cbd5e1;font-weight:700;font-size:0.95rem;margin-bottom:6px">🔍 其他選項解析(為何也不是答案)</div>
          ${otherAnalysis}
        </div>` : ''}

        ${e.hook ? `<div style="background:rgba(250,204,21,0.12);border-left:4px solid #facc15;padding:10px 12px;border-radius:6px;margin:10px 0">
          <div style="color:#facc15;font-weight:700;font-size:0.85rem">💡 記憶口訣</div>
          <div style="color:var(--fg);font-style:italic;margin-top:2px">${e.hook}</div>
        </div>` : ''}

        ${q.misconceptions && q.misconceptions.length > 0 ? `<div style="background:rgba(168,85,247,0.10);border-left:4px solid #a855f7;padding:10px 12px;border-radius:6px;margin:10px 0">
          <div style="color:#c084fc;font-weight:700;font-size:0.85rem">⚠️ 此題常見誤解</div>
          <div style="color:var(--fg);margin-top:2px">${q.misconceptions.map(m => '• ' + m).join('<br>')}</div>
        </div>` : ''}

        <div class="actions" style="margin-top:14px">
          <button class="btn btn-primary" onclick="PlayEngine.next()">繼續下一題 →</button>
          ${!isCorrect ? `<button class="btn btn-warn" onclick="PlayEngine.drill()">🎯 立即下鑽變化型</button>` : ''}
          <button class="btn btn-ghost" onclick="goHome()">回首頁</button>
        </div>
      </div>
    `;
    document.getElementById('play-explanation').innerHTML = html;
    refreshHome();
  },

  drill() {
    // 鐵律 #1:對錯題生成結構化變化型(換角度 / 易混淆 / 加深難度)
    const variations = generateVariation(this.current, 3);
    if (!variations || variations.length === 0) {
      showToast('⚠️ 此題知識點變化型不足,題庫尚未充實。請繼續下一題', 3000);
      return;
    }
    DrillSession.start(this.current.node_id, variations, this.current);
  },

  next() {
    if (this.onNext) this.onNext();
    else goHome();
  }
};

// === Drill Session(鐵律 #1 結構化下鑽連戰)===
const DrillSession = {
  queue: [], targetNode: null, correct: 0, total: 0, originalQ: null,
  strategyEmoji: { '換角度': '🔄', '易混淆對手': '⚔️', '加深難度': '🔥', '勘誤強化': '⚠️',
    '同知識點': '📚', '同主題擴展': '🌐', '同主題綜合': '🎯', '同主題補強': '➕' },
  start(nodeId, questions, originalQ, onComplete) {
    this.onComplete = onComplete || null; // 完成後 callback,沒則回首頁
    if (!questions || questions.length === 0) {
      showToast('⚠️ 找不到變化型題目,題庫該知識點不足。請繼續其他題目', 3500);
      setTimeout(() => {
        if (this.onComplete) this.onComplete();
        else if (PlayEngine.onNext) PlayEngine.onNext();
      }, 1200);
      return;
    }
    this.queue = questions; this.targetNode = nodeId; this.originalQ = originalQ;
    this.correct = 0; this.total = questions.length;
    showToast(`🎯 結構化下鑽啟動:${questions.length} 題(${questions.map(q => q._drillStrategy).join(' → ')})`, 3500);
    this.next();
  },
  next() {
    if (this.queue.length === 0) {
      if (this.total === 0) {
        if (this.onComplete) this.onComplete();
        else if (PlayEngine.onNext) PlayEngine.onNext();
        return;
      }
      Mastery.drillBonus(this.targetNode);
      if (PlayEngine.current && PlayEngine.current.id) Wrongbook.markMastered(PlayEngine.current.id);
      const ratio = Math.round(this.correct / this.total * 100);
      const allCorrect = this.correct === this.total;
      showToast(`${allCorrect ? '🎉' : '✓'} 下鑽完成!正答 ${this.correct}/${this.total} (${ratio}%) · 熟練度 +20%`, 3500);
      if (window.confetti && allCorrect && this.total > 0) GameFX.bigConfetti();
      // 完成後:若有 onComplete 就呼叫(回到原戰鬥),否則才回首頁
      setTimeout(() => {
        if (this.onComplete) {
          const cb = this.onComplete;
          this.onComplete = null; // 清除避免重複呼叫
          cb();
        } else {
          goHome();
        }
      }, 2000);
      return;
    }
    const q = this.queue.shift();
    const strategy = q._drillStrategy || '同主題';
    const emoji = this.strategyEmoji[strategy] || '🎯';
    const stepNum = this.total - this.queue.length;
    const strategyDesc = {
      '換角度': '同一知識點換不同形式呈現,測試是否真懂概念',
      '易混淆對手': '從相關易混淆知識點挑題,訓練辨別能力',
      '加深難度': '更難的陷阱題,挑戰細節掌握',
      '勘誤強化': '官方勘誤關鍵點,絕不能漏',
      '同知識點': '同一知識點不同題目,鞏固記憶',
      '同知識點再深入': '同一知識點再深入測試',
      '同主題延伸': '同主題關鍵詞重疊的延伸題'
    };
    // 上層題核心摘要(讓使用者看到「下鑽是針對什麼概念」)
    const upperHook = (this.originalQ && this.originalQ.explanation && this.originalQ.explanation.hook) || '';
    const upperMiscon = (this.originalQ && this.originalQ.misconceptions || []).slice(0, 1).join(' / ');
    const upperCode = (this.originalQ && this.originalQ.knowledge_code) || '';
    const ctx = `<div class="boss-bar" style="background:linear-gradient(90deg,#ef4444,#f59e0b)">
      <div class="boss-name">${emoji} 下鑽訓練 ${stepNum}/${this.total} — 策略:<strong style="color:#fef3c7">${strategy}</strong></div>
      <div style="font-size:0.85rem;color:rgba(255,255,255,0.85);margin-top:6px">
        ${strategyDesc[strategy] || ''}
      </div>
      ${upperHook || upperMiscon ? `<div style="margin-top:8px;padding:8px;background:rgba(0,0,0,0.25);border-radius:6px;border-left:3px solid #fef3c7">
        <div style="font-size:0.75rem;color:#fef3c7;font-weight:700">📌 上層題核心(${upperCode})</div>
        ${upperHook ? `<div style="font-size:0.85rem;color:white;margin-top:2px">💡 ${upperHook}</div>` : ''}
        ${upperMiscon ? `<div style="font-size:0.8rem;color:rgba(255,255,255,0.8);margin-top:2px">⚠️ 易錯:${upperMiscon}</div>` : ''}
      </div>` : ''}
    </div>`;
    PlayEngine.show(q, { contextHTML: ctx });
    PlayEngine.onNext = () => {
      // 統計正答(從 PlayEngine 的最後一題狀態判斷)
      DrillSession.next();
    };
    // 包裝 PlayEngine.answer 以便統計正答
    const origAnswer = PlayEngine.answer.bind(PlayEngine);
    PlayEngine.answer = function(key) {
      const o = this.current.options.find(opt => opt.key === key);
      if (o && o.is_correct) DrillSession.correct++;
      origAnswer(key);
      PlayEngine.answer = origAnswer; // 還原
    };
  }
};

// === Review 錯題本 ===
const Review = {
  start() {
    const w = Wrongbook.load().filter(x => !x.mastered);
    if (w.length === 0) {
      document.getElementById('view-review').innerHTML = '<div class="card"><div class="empty">🎉 沒有未復習的錯題,做題後再來</div><div style="text-align:center"><button class="btn btn-primary" onclick="goHome()">回首頁</button></div></div>';
      show('view-review'); return;
    }
    const html = `<div class="card"><h2>📝 錯題本(${w.length} 題待復習)</h2>
      <p style="color:var(--fg-dim);margin-bottom:12px">點擊任一題進入下鑽訓練(鐵律 #1)</p>
      <div class="weak-list">${w.map(x => {
        const q = QUESTIONS.find(qq => qq.id === x.qid);
        if (!q) return '';
        return `<button class="weak-item" style="cursor:pointer" onclick="Review.drillItem('${x.qid}')">
          <span style="text-align:left;flex:1">${q.stem.substring(0,60).replace(/\\{[^}]+\\}/g,'')}...</span>
          <span class="weak-score low">錯 ${x.wrongCount} 次</span>
        </button>`;
      }).join('')}</div>
      <div class="actions" style="margin-top:12px">
        <button class="btn btn-primary" onclick="Review.drillAll()">🎯 全部下鑽訓練</button>
        <button class="btn btn-ghost" onclick="goHome()">回首頁</button>
      </div></div>`;
    document.getElementById('view-review').innerHTML = html;
    show('view-review');
  },
  drillItem(qid) {
    const q = QUESTIONS.find(qq => qq.id === qid);
    if (!q) return;
    const variations = generateVariation(q, 3);
    DrillSession.start(q.node_id, variations);
  },
  drillAll() {
    const w = Wrongbook.load().filter(x => !x.mastered);
    if (w.length === 0) return;
    const allVariations = [];
    w.forEach(x => {
      const q = QUESTIONS.find(qq => qq.id === x.qid);
      if (q) allVariations.push(...generateVariation(q, 1));
    });
    DrillSession.start('mixed', allVariations);
  }
};

// === 模式佔位符(由 sub agent 各自實作)===
// 案 1 RPG 顧問:由 sub agent 1 實作 → modes/mode1.js
// 案 2 程式判讀:由 sub agent 2 實作 → modes/mode2.js
// 案 3 Pipeline:由 sub agent 3 實作 → modes/mode3.js

// === 案 4 配對戰(reference 實作)===
const Mode4 = {
  start() {
    // 抽 6 題 matching format
    const pool = QUESTIONS.filter(q => q.format === 'matching');
    if (pool.length < 4) {
      showToast('配對題數不足,請先確保 questions-extra.json 已載入');
      goHome(); return;
    }
    this.queue = RNG.pickN(pool, Math.min(8, pool.length));
    this.idx = 0; this.correct = 0;
    this.nextOne();
  },
  nextOne() {
    if (this.idx >= this.queue.length) { this.finish(); return; }
    const q = this.queue[this.idx++];
    PlayEngine.show(q, { contextHTML: `<div class="card"><h2>⚡ 易混淆配對戰(${this.idx}/${this.queue.length})</h2></div>` });
    PlayEngine.onNext = () => this.nextOne();
  },
  finish() {
    document.getElementById('view-result').innerHTML = `<div class="card">
      <h2>🎉 配對戰結束</h2>
      <p>本場 ${this.queue.length} 題</p>
      <div class="actions">
        <button class="btn btn-primary" onclick="Mode4.start()">再來一場</button>
        <button class="btn btn-ghost" onclick="goHome()">回首頁</button>
      </div></div>`;
    show('view-result');
  }
};

// 注意:Mode1/2/3/5 由 modes/*.js 動態載入後寫入 window.ModeN

// === 遊戲化共用引擎(Phase C)===
const GameFX = {
  flash(kind = 'correct') {
    const el = document.createElement('div');
    el.className = `flash-overlay ${kind}`;
    document.body.appendChild(el);
    requestAnimationFrame(() => el.classList.add('show'));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 300); }, 300);
  },
  damageNumber(targetEl, amount, opts = {}) {
    if (!targetEl) return;
    const r = targetEl.getBoundingClientRect();
    const num = document.createElement('div');
    num.className = `damage-num ${opts.kind || 'enemy'}${opts.crit ? ' crit' : ''}`;
    num.textContent = (opts.crit ? '💥 ' : '-') + amount;
    num.style.left = (r.left + r.width/2) + 'px';
    num.style.top = (r.top + 20) + 'px';
    document.body.appendChild(num);
    if (window.gsap) {
      gsap.fromTo(num, { y: 0, opacity: 1, scale: 0.5 },
        { y: -80, opacity: 0, scale: opts.crit ? 2 : 1.4, duration: 1.2, ease: 'power2.out',
          onComplete: () => num.remove() });
    } else { setTimeout(() => num.remove(), 1200); }
  },
  shake(el) { if (!el) return; el.classList.add('taking-damage'); setTimeout(() => el.classList.remove('taking-damage'), 400); },
  attackAnim(el) { if (!el) return; el.classList.add('attacking'); setTimeout(() => el.classList.remove('attacking'), 500); },
  confetti(opts = {}) {
    if (!window.confetti) return;
    confetti({ particleCount: opts.count || 60, spread: 70, origin: { y: 0.6 }, ...opts });
  },
  bigConfetti() {
    if (!window.confetti) return;
    confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
    setTimeout(() => confetti({ particleCount: 100, angle: 60, spread: 55, origin: { x: 0 } }), 250);
    setTimeout(() => confetti({ particleCount: 100, angle: 120, spread: 55, origin: { x: 1 } }), 500);
  },
  combo(n) {
    let el = document.querySelector('.combo-display');
    if (!el) { el = document.createElement('div'); el.className = 'combo-display'; document.body.appendChild(el); }
    el.innerHTML = `🔥 <span class="combo-num">${n}</span> COMBO!`;
    el.classList.add('show');
    if (window.gsap) {
      gsap.fromTo(el, { scale: 0.5, x: 50 }, { scale: 1, x: 0, duration: 0.4, ease: 'back.out(2)' });
    }
    clearTimeout(this._comboTimer);
    this._comboTimer = setTimeout(() => el.classList.remove('show'), 1800);
  },
  hideCombo() { const el = document.querySelector('.combo-display'); if (el) el.classList.remove('show'); },
  levelUp(newLevel) {
    const overlay = document.createElement('div');
    overlay.className = 'level-up';
    overlay.innerHTML = `<div class="level-up-card">
      <h1>⭐ LEVEL UP!</h1>
      <div style="font-size:3rem;font-weight:900">Lv. ${newLevel}</div>
      <div style="margin-top:8px">獲得 1 個技能點</div>
      <button class="btn btn-primary" style="margin-top:16px;background:#422006;color:#fef3c7" onclick="this.closest('.level-up').remove()">繼續</button>
    </div>`;
    document.body.appendChild(overlay);
    const card = overlay.querySelector('.level-up-card');
    if (window.gsap) gsap.to(card, { scale: 1, duration: 0.6, ease: 'back.out(1.7)' });
    else card.style.transform = 'scale(1)';
    this.bigConfetti();
  }
};

// === 程式碼語法高亮(共用)===
function highlightCodeSimple(code) {
  if (!code) return '';
  let s = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/(#[^\n]*)/g, '<span class="com">$1</span>');
  s = s.replace(/(["'])((?:(?!\1).)*)\1/g, '<span class="str">$1$2$1</span>');
  s = s.replace(/\b(import|from|def|class|return|if|else|elif|for|while|in|as|with|try|except|None|True|False|lambda|pass|self|print|len|range|np|pd|sklearn|torch|nn|tf)\b/g, '<span class="kw">$1</span>');
  s = s.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');
  return s;
}

// === 渲染視覺資料(表格 / 程式碼語法高亮)===
function renderVisualData(q) {
  if (!q) return '';
  let html = '';
  // 表格資料
  if (q.table_data && Array.isArray(q.table_data) && q.table_data.length > 0) {
    const headers = q.table_columns || Object.keys(q.table_data[0]);
    html += '<div class="visual-data"><div class="visual-data-title">📊 資料表格</div><table class="data-table"><thead><tr>';
    headers.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';
    q.table_data.forEach(row => {
      html += '<tr>';
      headers.forEach(h => {
        const v = row[h];
        const cls = (q.highlight_cells && q.highlight_cells.includes(`${row[headers[0]]}|${h}`)) ? 'highlight' : '';
        html += `<td class="${cls}">${v != null ? v : ''}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }
  // 圖表資料(SVG bar chart)
  if (q.chart_data && q.chart_data.type === 'bar') {
    const max = Math.max(...q.chart_data.values);
    html += '<div class="visual-data"><div class="visual-data-title">📈 圖表</div><svg viewBox="0 0 400 200" style="width:100%;background:var(--bg-3);border-radius:var(--radius-sm);padding:12px">';
    q.chart_data.values.forEach((v, i) => {
      const h = (v / max) * 140;
      const x = 30 + i * 50;
      html += `<rect x="${x}" y="${180 - h}" width="40" height="${h}" fill="var(--primary)" />`;
      html += `<text x="${x + 20}" y="195" text-anchor="middle" fill="var(--fg-dim)" font-size="10">${q.chart_data.labels[i]}</text>`;
      html += `<text x="${x + 20}" y="${175 - h}" text-anchor="middle" fill="var(--fg)" font-size="11">${v}</text>`;
    });
    html += '</svg></div>';
  }
  return html;
}

// === Player 系統 ===
const Player = {
  load() {
    return Storage.get('ipas_player_v1', { hp: 100, hpMax: 100, mp: 50, mpMax: 50,
      level: 1, exp: 0, expMax: 100, skillPoints: 0,
      stats: { analysis: 5, planning: 5, decision: 5, technical: 5 },
      skills: { hint: false, eliminate: false, double: false } });
  },
  save(p) { Storage.set('ipas_player_v1', p); },
  damage(amt) { const p = this.load(); p.hp = Math.max(0, p.hp - amt); this.save(p); return p.hp; },
  heal(amt) { const p = this.load(); p.hp = Math.min(p.hpMax, p.hp + amt); this.save(p); return p.hp; },
  gainExp(amt) {
    const p = this.load();
    p.exp += amt;
    while (p.exp >= p.expMax) {
      p.exp -= p.expMax; p.level++; p.skillPoints++;
      p.expMax = Math.floor(p.expMax * 1.5);
      p.hpMax += 20; p.hp = p.hpMax; p.mpMax += 10; p.mp = p.mpMax;
      GameFX.levelUp(p.level);
    }
    this.save(p);
    return p;
  },
  reset() { Storage.del('ipas_player_v1'); }
};

})();
